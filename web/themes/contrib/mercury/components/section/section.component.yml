"$schema": "https://git.drupalcode.org/project/drupal/-/raw/10.1.x/core/modules/sdc/src/metadata.schema.json"
name: Section
group: Layout
status: stable
description: A section for nested components
props:
  type: object
  properties:
    columns:
      type: string
      title: Content layout
      enum:
        - "100"
        - "50-50"
        - "33-33-33"
        - "75-25"
        - "25-75"
        - "67-33"
        - "33-67"
        - "50-25-25"
        - "25-25-50"
        - "25-25-25-25"
      examples:
        - "50-50"
      default:
        - "50-50"
    width:
      type: string
      title: Section width
      enum:
        - "100%"
        - "90%"
        - "80%"
        - "75%"
        - "50%"
      default: "100%"
      examples:
        - "100%"
    margin_block_start:
      type: string
      title: Margin top
      enum:
        - "0"
        - "8"
        - "20"
        - "32"
        - "48"
        - "64"
        - "96"
        - "128"
      examples:
        - "48"
    margin_block_end:
      type: string
      title: Margin bottom
      enum:
        - "0"
        - "8"
        - "20"
        - "32"
        - "48"
        - "64"
        - "96"
        - "128"
      examples:
        - "48"
    padding_block_start:
      type: string
      title: Padding top
      enum:
        - "0"
        - "16"
        - "32"
        - "64"
      examples:
        - "0"
    padding_block_end:
      type: string
      title: Padding bottom
      enum:
        - "0"
        - "16"
        - "32"
        - "64"
      examples:
        - "0"
    background_color:
      type: string
      title: Background color
      enum:
        - overlay
        - brand
        - brand-light
        - brand-dark
        - accent
        - accent-light
        - accent-dark
      meta:enum:
        overlay: Overlay tint
        brand: Brand
        brand-light: Brand light
        brand-dark: Brand dark
        accent: Accent
        accent-light: Accent light
        accent-dark: Accent dark
    background_media:
      $ref: json-schema-definitions://canvas.module/image
      title: Background image
      description: The background image for section.
      type: object
    section_header:
      type: boolean
      title: Show header region
      examples:
        - true
      default:
        - true
    section_footer:
      type: boolean
      title: Show footer region
      examples:
        - true
      default:
        - true

slots:
  header_slot:
    title: "Header"
  main_slot:
    title: "Grid"
  footer_slot:
    title: "Footer"

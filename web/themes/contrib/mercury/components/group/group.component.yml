"$schema": "https://git.drupalcode.org/project/drupal/-/raw/10.1.x/core/modules/sdc/src/metadata.schema.json"
name: Group
group: Layout
status: stable
description: A group for nested components
props:
  type: object
  properties:
    flex_direction:
      type: string
      title: Item direction
      enum:
        - column
        - row
        - column-reverse
        - row-reverse
      meta:enum:
        column: Vertical
        row: Horizontal
        column-reverse: Vertical (reverse)
        row-reverse: Horizontal (reverse)
      examples:
        - "column"
    flex_gap:
      type: string
      title: Extra space between items
      enum:
        - sm
        - md
        - lg
        - xl
      meta:enum:
        sm: Small
        md: Medium
        lg: Large
        xl: Extra-Large
      examples:
        - md
    flex_align:
      type: string
      title: Alignment within parent component
      enum:
        - start
        - center
        - end
      meta:enum:
        start: Start
        center: Center
        end: End
      default: "center"
      examples:
        - "center"
    radius:
      type: string
      title: Rounded corners
      enum:
        - sm
        - md
        - lg
        - xl
      meta:enum:
        sm: Small
        md: Medium
        lg: Large
        xl: Extra-Large
      examples:
        - sm
    padding:
      type: string
      title: Padding
      enum:
        - sm
        - md
        - lg
        - xl
      meta:enum:
        sm: Small
        md: Medium
        lg: Large
        xl: Extra-Large
      examples:
        - sm
    background:
      type: string
      title: Background color
      enum:
        - brand
        - brand-light
        - brand-dark
        - accent
        - accent-light
        - accent-dark
      meta:enum:
        brand: Brand
        brand-light: Brand light
        brand-dark: Brand dark
        accent: Accent
        accent-light: Accent light
        accent-dark: Accent dark

slots:
  group_slot:
    title: "Group items"

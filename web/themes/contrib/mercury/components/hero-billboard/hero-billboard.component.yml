"$schema": "https://git.drupalcode.org/project/drupal/-/raw/10.1.x/core/modules/sdc/src/metadata.schema.json"
name: Hero billboard
description: Hero with stacked slots for media and content.
group: Layout
props:
  type: object
  required:
    - overlay_opacity
  properties:
    height:
      type: string
      title: Hero height
      enum:
        - full
        - large
        - ribbon
      meta:enum:
        full: Full screen
        large: Large
        ribbon: Ribbon
      default: full
      examples:
        - full
    flex_position:
      type: string
      title: Content position
      enum:
        - top-left
        - center-left
        - bottom-left
        - hero-center
      meta:enum:
        top-left: Top/left
        center-left: Center/left
        bottom-left: Bottom/left
        hero-center: Center/Center
      default: center-left
      examples:
        - center-left
    overlay_opacity:
      type: string
      title: Overlay opacity
      description: Set overlay opacity
      enum:
        - "0%"
        - "20%"
        - "40%"
        - "60%"
        - "75%"
      default: "0%"
      examples:
        - "0%"
    object_position:
      type: string
      title: Background image position
      enum:
        - top
        - center
        - bottom
      default: center
      examples:
        - center
    media:
      $ref: json-schema-definitions://canvas.module/image
      title: Background image
      description: Media image for the hero.
      type: object
      examples:
        - src: "assets/boliviainteligente-QPu42AAJ5ZY-unsplash.jpg"
          alt: "Placeholder image"

slots:
  hero_slot:
    title: "Hero content"

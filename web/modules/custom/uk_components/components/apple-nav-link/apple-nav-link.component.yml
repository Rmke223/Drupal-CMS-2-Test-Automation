$schema: "https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json"

name: Apple Nav Link
status: experimental
group: Apple
description: Navigation link for Apple Global Nav.

props:
  type: object
  required: [title, url]
  properties:
    title:
      type: string
      title: Link text
      examples: ["Store"]
    url:
      type: string
      title: URL
      examples: ["/us/shop/goto/store"]
    display:
      type: string
      title: Display style
      enum: [text, icon]
      default: text
    icon:
      type: string
      title: Icon
      enum: [none, search, bag]
      default: none
